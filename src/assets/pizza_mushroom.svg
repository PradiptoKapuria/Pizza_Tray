    <!-- Gills on underside near stem -->
    <line x1="302" y1="268" x2="296" y2="282" stroke="#A07848" stroke-width="2" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(160, 120, 72);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="315" y1="271" x2="311" y2="285" stroke="#A07848" stroke-width="2" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(160, 120, 72);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="328" y1="272" x2="326" y2="286" stroke="#A07848" stroke-width="2" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(160, 120, 72);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="340" y1="273" x2="340" y2="286" stroke="#A07848" stroke-width="2" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(160, 120, 72);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="352" y1="272" x2="354" y2="286" stroke="#A07848" stroke-width="2" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(160, 120, 72);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="365" y1="271" x2="369" y2="285" stroke="#A07848" stroke-width="2" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(160, 120, 72);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="378" y1="268" x2="384" y2="282" stroke="#A07848" stroke-width="2" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(160, 120, 72);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Cap outline -->
  <ellipse cx="340" cy="230" rx="128" ry="95" fill="none" stroke="#8B6840" stroke-width="4" style="fill:none;stroke:rgb(139, 104, 64);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Stem outline -->
  <rect x="295" y="270" width="90" height="68" rx="10" fill="none" stroke="#8B6840" stroke-width="3.5" style="fill:none;stroke:rgb(139, 104, 64);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Stem-cap junction line -->
  <line x1="295" y1="278" x2="385" y2="278" stroke="#8B6840" stroke-width="2.5" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(139, 104, 64);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>